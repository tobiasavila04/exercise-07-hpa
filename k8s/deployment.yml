apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-registry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-registry
  template:
    metadata:
      labels:
        app: node-registry
    spec:
      containers:
        - name: api
          image: exercise-07-hpa-api
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: postgresql://noderegistry:noderegistry@db:5432/noderegistry
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
